services:
  postgres:
    image: postgres:16-alpine
    container_name: optime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: optime
      POSTGRES_PASSWORD: optime
      POSTGRES_DB: optime
    ports:
      - "5432:5432"
    volumes:
      - optime-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optime -d optime"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  optime-postgres-data:
